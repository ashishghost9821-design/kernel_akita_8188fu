name: Build 8188fu for Lenovo Tab M8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make binutils-aarch64-linux-gnu python3

      - name: Download Android Clang 9.0.3
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android10-gsi clang-prebuilts
          export PATH=$(pwd)/clang-prebuilts/clang-r353983c/bin:$PATH
          clang --version

      - name: Prepare kernel with exact config
        run: |
          export PATH=$(pwd)/clang-prebuilts/clang-r353983c/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ARCH=arm64
          echo "" > .scmversion
          make CC="clang -fno-integrated-as" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make CC="clang -fno-integrated-as" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- prepare
          make CC="clang -fno-integrated-as" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- scripts
          make CC="clang -fno-integrated-as" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build 8188fu module
        run: |
          export PATH=$(pwd)/clang-prebuilts/clang-r353983c/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ARCH=arm64
          export KSRC=$(pwd)
          cd drivers/net/wireless/realtek/rtl8188fu
          make ARCH=arm64 CC="clang -fno-integrated-as" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KSRC=$KSRC KBUILD_LDFLAGS_MODULE="-T $KSRC/arch/arm64/kernel/module.lds"
          find . -name "*.ko"
          aarch64-linux-gnu-readelf -S rtl8188fu.ko | grep plt

      - name: Upload 8188fu.ko
        uses: actions/upload-artifact@v4
        with:
          name: 8188fu-ko
          path: drivers/net/wireless/realtek/rtl8188fu/rtl8188fu.ko
